      { q: "家月___我你已经接到她们了。", correct: "告诉", options: ["告诉", "上网", "新年", "笔"] },
      { q: "祝大家___快乐！", correct: "新年", options: ["新年", "班", "花", "里面"] },
      { q: "王老师___我们汉语。", correct: "教", options: ["教", "告诉", "希望", "可能"] },
      { q: "春天来了，公园里有很多漂亮的___。", correct: "花", options: ["花", "笔", "洗手间", "班"] },
      { q: "我___明天天气会很好。", correct: "希望", options: ["希望", "告诉", "教", "上网"] },
      { q: "书在桌子___。", correct: "上面", options: ["上面", "里面", "那样", "洗手间"] },
      { q: "请问___在哪儿？", correct: "洗手间", options: ["洗手间", "班", "里面", "上面"] },
      { q: "汉字“日”比“口”多一___。", correct: "笔", options: ["笔", "花", "班", "新年"] },
      { q: "只要你努力，___你就能成功。", correct: "那样", options: ["那样", "可能", "告诉", "上网"] }
    ];

    // --- COMPONENTS ---

    const playAudio = (text) => {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
      }
    };

    const Flashcards = () => {
      const [currentIndex, setCurrentIndex] = useState(0);
      const [isFlipped, setIsFlipped] = useState(false);
      const card = VOCABULARY[currentIndex];

      const handlePrev = () => {
        setCurrentIndex(prev => prev > 0 ? prev - 1 : VOCABULARY.length - 1);
        setIsFlipped(false);
      };

      const handleNext = () => {
        setCurrentIndex(prev => prev < VOCABULARY.length - 1 ? prev + 1 : 0);
        setIsFlipped(false);
      };

      return (
        <div className="flex flex-col items-center justify-center space-y-6 w-full max-w-2xl mx-auto py-8">
          <div 
            onClick={() => setIsFlipped(!isFlipped)}
            className="cursor-pointer bg-slate-800 border border-slate-700 shadow-2xl rounded-2xl p-10 w-full text-center relative overflow-hidden transition-all duration-300 hover:shadow-teal-900/20 min-h-[450px] flex flex-col justify-center"
          >
            <div className="absolute top-4 right-4 text-slate-500 font-mono text-sm">
              {currentIndex + 1} / {VOCABULARY.length}
            </div>
            
            {!isFlipped ? (
              <div className="flex flex-col items-center fade-in zoom-in">
                <button 
                  onClick={(e) => { e.stopPropagation(); playAudio(card.hanzi); }}
                  className="mx-auto bg-teal-500/10 text-teal-400 p-5 rounded-full mb-8 hover:bg-teal-500/20 transition-colors"
                >
                  <Volume2 size={40} />
                </button>
                <h2 className="text-8xl sm:text-9xl font-bold text-white mb-8 drop-shadow-md">{card.hanzi}</h2>
                <p className="text-slate-500 mt-4 text-sm font-medium tracking-wider animate-pulse">Ko'rish uchun bosing (点击翻转)</p>
              </div>
            ) : (
              <div className="flex flex-col items-center fade-in zoom-in w-full">
                <button 
                  onClick={(e) => { e.stopPropagation(); playAudio(card.hanzi); }}
                  className="mx-auto bg-teal-500/10 text-teal-400 p-3 rounded-full mb-4 hover:bg-teal-500/20 transition-colors"
                >
                  <Volume2 size={24} />
                </button>
                <h2 className="text-5xl font-bold text-white mb-2 drop-shadow-md">{card.hanzi}</h2>
                <p className="text-3xl text-teal-400 font-medium mb-6 font-sans">{card.pinyin}</p>
                
                <div className="space-y-3 text-lg w-full max-w-sm">
                  <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-700/50 text-slate-200">
                    <span className="text-xs text-teal-500/70 font-bold uppercase tracking-wider block mb-1">Uzbek</span>
                    {card.uz}
                  </div>
                  <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-700/50 text-slate-200">
                    <span className="text-xs text-blue-400/70 font-bold uppercase tracking-wider block mb-1">Russian</span>
                    {card.ru}
                  </div>
                  <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-700/50 text-slate-200">
                    <span className="text-xs text-emerald-400/70 font-bold uppercase tracking-wider block mb-1">English</span>
                    {card.en}
                  </div>
                </div>
              </div>
            )}
          </div>

          <div className="flex space-x-6 w-full justify-center">
            <button 
              onClick={handlePrev}
              className="flex items-center px-6 py-3 bg-slate-800 hover:bg-slate-700 text-white rounded-xl shadow-lg transition-colors border border-slate-700"
            >
              <ChevronLeft className="mr-2" /> Oldingisi
            </button>
            <button 
              onClick={handleNext}
              className="flex items-center px-6 py-3 bg-teal-600 hover:bg-teal-500 text-white rounded-xl shadow-lg transition-colors"
            >
              Keyingisi <ChevronRight className="ml-2" />
            </button>
          </div>
        </div>
      );
    };

    const QuizComponent = ({ title, data, isHanziOptions = false }) => {
      const [currentQ, setCurrentQ] = useState(0);
      const [score, setScore] = useState(0);
      const [showResult, setShowResult] = useState(false);
      const [selected, setSelected] = useState(null);
      const [answered, setAnswered] = useState(false);

      const handleAnswer = (option) => {
        if (answered) return;
        setSelected(option);
        setAnswered(true);
        if (option === data[currentQ].correct) setScore(s => s + 1);
      };

      const nextQ = () => {
        if (currentQ < data.length - 1) {
          setCurrentQ(prev => prev + 1);
          setSelected(null);
          setAnswered(false);
        } else {
          setShowResult(true);
        }
      };

      const reset = () => {
        setCurrentQ(0);
        setScore(0);
        setShowResult(false);
        setSelected(null);
        setAnswered(false);
      };

      if (showResult) {
        return (
          <div className="text-center bg-slate-800 p-12 rounded-2xl border border-slate-700 shadow-xl max-w-xl mx-auto my-12 fade-in">
            <Award className="w-24 h-24 mx-auto text-teal-400 mb-6" />
            <h2 className="text-3xl font-bold text-white mb-4">Natija!</h2>
            <p className="text-xl text-slate-300 mb-8">Siz {data.length} ta savoldan <span className="text-teal-400 font-bold text-2xl">{score}</span> tasiga to'g'ri javob berdingiz.</p>
            <button onClick={reset} className="flex items-center mx-auto px-8 py-3 bg-teal-600 hover:bg-teal-500 text-white rounded-xl shadow-lg transition-all font-semibold">
              <RefreshCw className="mr-2" /> Qayta urinish
            </button>
          </div>
        );
      }

      const q = data[currentQ];

      return (
        <div className="max-w-2xl mx-auto bg-slate-800 border border-slate-700 rounded-2xl p-8 shadow-xl my-8 fade-in">
          <div className="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
            <h3 className="text-lg font-semibold text-slate-400">{title}</h3>
            <span className="bg-slate-900 px-4 py-1.5 rounded-full text-teal-400 font-mono font-bold text-sm">
              {currentQ + 1} / {data.length}
            </span>
          </div>

          <div className="mb-10 text-center">
            {q.question && <p className="text-slate-400 mb-4 text-lg">{q.question}</p>}
            {q.hanzi && <h2 className="text-6xl font-bold text-white mb-6 drop-shadow-md">{q.hanzi}</h2>}
            {!q.hanzi && <h2 className="text-3xl font-bold text-white mb-6 leading-relaxed">{q.q}</h2>}
          </div>

          <div className="space-y-4">
            {q.options.map((opt, i) => {
              let stateClass = "bg-slate-700/50 text-slate-200 hover:bg-slate-700 border-slate-600";
              if (answered) {
                if (opt === q.correct) stateClass = "bg-teal-900/50 border-teal-500 text-teal-300";
                else if (opt === selected) stateClass = "bg-red-900/50 border-red-500 text-red-300";
                else stateClass = "bg-slate-800 border-slate-700 text-slate-500 opacity-50";
              }

              return (
                <button
                  key={i}
                  onClick={() => handleAnswer(opt)}
                  disabled={answered}
                  className={`w-full text-left p-5 rounded-xl border-2 transition-all flex justify-between items-center ${isHanziOptions ? 'text-2xl font-bold' : 'text-lg'} ${stateClass}`}
                >
                  <span>{opt}</span>
                  {answered && opt === q.correct && <CheckCircle2 className="text-teal-500" />}
                  {answered && opt === selected && opt !== q.correct && <XCircle className="text-red-500" />}
                </button>
              );
            })}
          </div>

          {answered && (
            <div className="mt-8 flex justify-end">
              <button onClick={nextQ} className="flex items-center px-8 py-3 bg-teal-600 hover:bg-teal-500 text-white rounded-xl shadow-lg transition-all font-semibold fade-in">
                {currentQ < data.length - 1 ? 'Keyingisi' : 'Natijani ko\'rish'} <ChevronRight className="ml-2" />
              </button>
            </div>
          )}
        </div>
      );
    };

    const Dialogues = () => {
      return (
        <div className="max-w-4xl mx-auto space-y-12 py-8 fade-in">
          {DIALOGUES.map((dialogue, idx) => (
            <div key={idx} className="bg-slate-800 rounded-2xl border border-slate-700 shadow-xl overflow-hidden">
              <div className="bg-slate-900/80 px-6 py-4 border-b border-slate-700">
                <h3 className="text-xl font-bold text-teal-400">{dialogue.title}</h3>
              </div>
              <div className="divide-y divide-slate-700/50">
                {dialogue.lines.map((line, i) => (
                  <div key={i} className="p-6 hover:bg-slate-750 transition-colors flex gap-4">
                    <button 
                      onClick={() => playAudio(line.hanzi)}
                      className="flex-shrink-0 mt-1 bg-slate-700 text-teal-400 p-2 rounded-full hover:bg-teal-600 hover:text-white transition-all h-fit"
                    >
                      <Volume2 size={20} />
                    </button>
                    <div className="flex-1 space-y-2">
                      <div className="flex flex-wrap items-baseline gap-3 mb-2">
                        <span className="px-2 py-1 bg-slate-900 text-slate-300 text-xs font-bold rounded-md uppercase tracking-wider">{line.speaker}</span>
                        <span className="text-2xl font-bold text-white">{line.hanzi}</span>
                      </div>
                      <p className="text-teal-400 font-medium mb-3">{line.pinyin}</p>
                      <div className="grid gap-2 text-sm text-slate-400 mt-4 bg-slate-900/30 p-4 rounded-lg">
                        <p><span className="text-slate-500 font-medium w-6 inline-block">UZ:</span> {line.uz}</p>
                        <p><span className="text-slate-500 font-medium w-6 inline-block">RU:</span> {line.ru}</p>
                        <p><span className="text-slate-500 font-medium w-6 inline-block">EN:</span> {line.en}</p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      );
    };

    const GrammarExplanations = () => {
      return (
        <div className="max-w-4xl mx-auto space-y-8 py-8 fade-in">
          {GRAMMAR.map((point, idx) => (
            <div key={idx} className="bg-slate-800 border border-slate-700 rounded-2xl p-8 shadow-xl">
              <h3 className="text-2xl font-bold text-white mb-6 border-b border-slate-700 pb-4">{point.title}</h3>
              
              <div className="space-y-4 mb-8">
                <p className="text-slate-300 flex items-start gap-3"><span className="bg-slate-900 px-2 py-1 rounded text-xs font-bold text-teal-500 mt-0.5">UZ</span> <span>{point.uzDesc}</span></p>
                <p className="text-slate-400 flex items-start gap-3"><span className="bg-slate-900 px-2 py-1 rounded text-xs font-bold text-blue-400 mt-0.5">RU</span> <span>{point.ruDesc}</span></p>
                <p className="text-slate-400 flex items-start gap-3"><span className="bg-slate-900 px-2 py-1 rounded text-xs font-bold text-emerald-400 mt-0.5">EN</span> <span>{point.enDesc}</span></p>
              </div>

              <h4 className="text-lg font-semibold text-teal-400 mb-4">Misollar (Examples):</h4>
              <div className="space-y-4">
                {point.examples.map((ex, i) => (
                  <div key={i} className="bg-slate-900/50 p-5 rounded-xl border border-slate-700/50 flex gap-4">
                     <button 
                      onClick={() => playAudio(ex.hanzi)}
                      className="flex-shrink-0 bg-slate-800 text-teal-400 p-2.5 rounded-full hover:bg-teal-600 hover:text-white transition-all h-fit"
                    >
                      <Volume2 size={18} />
                    </button>
                    <div>
                      <p className="text-xl font-bold text-white mb-1">{ex.hanzi}</p>
                      <p className="text-teal-400/80 mb-2">{ex.pinyin}</p>
                      <p className="text-slate-400 text-sm">{ex.uz}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      );
    };

    function App() {
      const [activeTab, setActiveTab] = useState('flashcards');

      const tabs = [
        { id: 'flashcards', label: 'Fleshkartalar', icon: <BookOpen size={18} /> },
        { id: 'vocabTest', label: 'Lug\'at testi', icon: <CheckSquare size={18} /> },
        { id: 'dialogue', label: 'Muloqot', icon: <MessageCircle size={18} /> },
        { id: 'grammar', label: 'Grammatika', icon: <FileText size={18} /> },
        { id: 'grammarTest', label: 'Grammatika testi', icon: <CheckSquare size={18} /> },
        { id: 'fillBlanks', label: 'So\'zlarni to\'ldirish', icon: <Edit3 size={18} /> }
      ];

      return (
        <div className="min-h-screen flex flex-col">
          {/* Header */}
          <header className="bg-slate-900 border-b border-slate-800 sticky top-0 z-10 shadow-lg">
            <div className="max-w-6xl mx-auto px-4 py-6">
              <h1 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-emerald-300 text-center drop-shadow-sm mb-2">
                我们爱上中文课 (Lesson 13)
              </h1>
              <h2 className="text-center text-slate-400 font-medium tracking-wide">
                Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz
              </h2>
            </div>
            
            {/* Navigation */}
            <div className="w-full overflow-x-auto custom-scrollbar border-t border-slate-800 bg-slate-900/50 backdrop-blur-md">
              <div className="flex justify-start md:justify-center w-max min-w-full px-4">
                {tabs.map(tab => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`flex items-center gap-2 px-6 py-4 font-medium text-sm transition-all whitespace-nowrap border-b-2
                      ${activeTab === tab.id 
                        ? 'border-teal-400 text-teal-400 bg-teal-400/10' 
                        : 'border-transparent text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}
                  >
                    {tab.icon} {tab.label}
                  </button>
                ))}
              </div>
            </div>
          </header>

          {/* Main Content */}
          <main className="flex-1 max-w-6xl mx-auto px-4 py-8 w-full">
            <div className="fade-in">
              {activeTab === 'flashcards' && <Flashcards />}
              {activeTab === 'vocabTest' && <QuizComponent title="Lug'at testi (Vocabulary Test)" data={VOCAB_TEST} />}
              {activeTab === 'dialogue' && <Dialogues />}
              {activeTab === 'grammar' && <GrammarExplanations />}
              {activeTab === 'grammarTest' && <QuizComponent title="Grammatika testi" data={GRAMMAR_TEST} isHanziOptions={true} />}
              {activeTab === 'fillBlanks' && <QuizComponent title="So'zlarni to'ldirish (Fill in the blanks)" data={FILL_BLANKS_TEST} isHanziOptions={true} />}
            </div>
          </main>

          {/* Footer */}
          <footer className="bg-slate-950 border-t border-slate-800 py-8 text-center text-slate-500 text-sm mt-auto">
            <p className="font-semibold text-slate-400 mb-1">HSK 2 NEW3.0 - Lesson 13</p>
            <p>&copy; 2026 Dilfuza Kāng lǎo shī (telegram@diffila)</p>
          </footer>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
