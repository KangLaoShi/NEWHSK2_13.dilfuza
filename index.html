                    { speaker: "陈天中", hanzi: "这一年王老师教我们中文，每天工作都很累。", pinyin: "Zhè yì nián Wáng lǎoshī jiāo wǒmen Zhōngwén, měi tiān gōngzuò dōu hěn lèi.", uz: "Bu yil Van o'qituvchi bizga xitoy tilini o'rgatdi, har kuni ishlash juda charchatadi.", ru: "В этом году учитель Ван преподавала нам китайский, каждый день работать очень утомительно.", en: "This year, Ms. Wang has been teaching us Chinese, and she works so hard every day." },
                    { speaker: "白家月", hanzi: "是啊，她教得很好。因为她，我们都非常爱上中文课。", pinyin: "Shì a, tā jiāo de hěn hǎo. Yīnwèi tā, wǒmen dōu fēicháng ài shàng Zhōngwén kè.", uz: "Ha, u juda yaxshi o'rgatadi. Uning sharofati bilan hammamiz xitoy tili darslarini yaxshi ko'rib qoldik.", ru: "Да, она отлично преподает. Благодаря ей мы все очень полюбили уроки китайского.", en: "Yes, she teaches very well. Because of her, we all love attending Chinese class." },

                    { speaker: "白家月", hanzi: "王老师喜欢花，就送给她花吧。", pinyin: "Wáng lǎoshī xǐhuan huā, jiù sòng gěi tā huā ba.", uz: "Van o'qituvchi gullarni yaxshi ko'radi, shuning uchun unga gul sovg'a qilamiz.", ru: "Учитель Ван любит цветы, давайте подарим ей цветы.", en: "Ms. Wang likes flowers. I think we can give her flowers." },
                    { speaker: "陈天中", hanzi: "那我们去花店看看，现在买花的人多，希望花店还有漂亮的花。", pinyin: "Nà wǒmen qù huādiàn kànkan, xiànzài mǎi huā de rén duō, xīwàng huādiàn hái yǒu piàoliang de huā.", uz: "U holda gul do'koniga borib ko'ramiz, hozir gul sotib oluvchilar ko'p, umid qilamanki, do'konda hali chiroyli gullar bor.", ru: "Тогда пойдем в цветочный магазин, сейчас много людей покупают цветы, надеюсь, там еще остались красивые цветы.", en: "Then let's go to the flower shop; there are many people buying flowers now. I hope there are still some beautiful flowers in the shop." }
                ]
            },
            {
                title: "Text 2: 在教室 (Sinf xonasida / В классе / In the classroom)",
                lines: [
                    { speaker: "白家月", hanzi: "王老师，今天的词比昨天多了十个。", pinyin: "Wáng lǎoshī, jīntiān de cí bǐ zuótiān duō le shí gè.", uz: "Van o'qituvchi, bugungi so'zlar kechagidan o'ntaga ko'p.", ru: "Учитель Ван, сегодня слов на десять больше, чем вчера.", en: "Ms. Wang, today's vocabulary has ten more words than yesterday's." },
                    { speaker: "王一飞", hanzi: "是啊！你们都学会了吗？", pinyin: "Shì a! Nǐmen dōu xuéhuì le ma?", uz: "Ha! Hammangiz o'rganib oldingizmi?", ru: "Да! Вы все их выучили?", en: "Yes! Have you all learned them?" },

                    { speaker: "王一飞", hanzi: "好。现在我来说，你们在本子上面写。", pinyin: "Hǎo. Xiànzài wǒ lái shuō, nǐmen zài běnzi shàngmiàn xiě.", uz: "Yaxshi. Hozir men aytaman, sizlar daftarga yozasizlar.", ru: "Хорошо. Сейчас я буду говорить, а вы пишите в тетрадях.", en: "Good. Now I'll say them, and you write them down in your notebooks." },
                    { speaker: "王一飞", hanzi: "同学们，“洗手间”的“间”字写错了，它的里面是“日”，不是“口”。", pinyin: "Tóngxuémen, 'xǐshǒujiān' de 'jiān' zì xiěcuò le, tā de lǐmiàn shì 'rì', bú shì 'kǒu'.", uz: "O'quvchilar, 'xǐshǒujiān' so'zidagi 'jiān' iyeroglifi xato yozilgan, uning ichida 'rì', 'kǒu' emas.", ru: "Ученики, иероглиф 'jiān' в слове 'xǐshǒujiān' написан неверно, внутри него 'rì', а не 'kǒu'.", en: "Class, the character '间' in '洗手间' is wrong. The part inside is '日', not '口'." },
                    { speaker: "白家月", hanzi: "“日”比“口”多一笔，写“口”就是“问题”的“问”了。", pinyin: "'Rì' bǐ 'kǒu' duō yì bǐ, xiě 'kǒu' jiù shì 'wèntí' de 'wèn' le.", uz: "'rì' da 'kǒu' ga qaraganda bitta chiziq ko'p, 'kǒu' ni yozsangiz 'wèntí' so'zidagi 'wèn' bo'lib qoladi.", ru: "В 'rì' на одну черту больше, чем в 'kǒu', если написать 'kǒu', то получится 'wèn' из 'wèntí'.", en: "'日' has one more stroke than '口'. Writing '口' turns it into the '问' in '问题'." },
                    { speaker: "王一飞", hanzi: "没错，你说得很对。", pinyin: "Méi cuò, nǐ shuō de hěn duì.", uz: "To'g'ri, juda to'g'ri aytdingiz.", ru: "Верно, ты абсолютно права.", en: "Yes, you are right." }
                ]
            },
            {
                title: "Text 3: 在教室 (Sinf xonasida / В классе / In the classroom)",
                lines: [
                    { speaker: "安妮", hanzi: "家月，你觉得这个本子怎么样？", pinyin: "Jiāyuè, nǐ juéde zhège běnzi zěnmeyàng?", uz: "Jiayue, bu daftar senga qanday tuyuldi?", ru: "Цзяюэ, как тебе эта тетрадь?", en: "Jiayue, what do you think of this notebook?" },

                    { speaker: "安妮", hanzi: "比我们一起买的那个本子贵一点儿。", pinyin: "Bǐ wǒmen yìqǐ mǎi de nàge běnzi guì yìdiǎnr.", uz: "Biz birga sotib olgan daftardan biroz qimmatroq.", ru: "Немного дороже той тетради, которую мы купили вместе.", en: "It's a bit more expensive than the notebook we bought together." },
                    { speaker: "白家月", hanzi: "这么漂亮的本子，不可能贵一点儿吧？", pinyin: "Zhème piàoliang de běnzi, bù kěnéng guì yìdiǎnr ba?", uz: "Bunday chiroyli daftar atigi ozgina qimmatroq bo'lishi mumkin emas-ku?", ru: "Такая красивая тетрадь не может быть лишь немного дороже, верно?", en: "For such a beautiful notebook, it couldn't be just a little more expensive, right?" },

        // --- QUIZ SYSTEM (For Tabs 2, 5, 6) ---
        class Quiz {

                this.container = document.getElementById(containerId);

                window[`quiz_${containerId}`] = this;
                this.reset();

            reset() {
                this.currentQ = 0;
                this.score = 0;
                this.answered = false;
                this.selected = null;
                this.render();
            }

            handleAnswer(optIndex) {
                if (this.answered) return;
                this.selected = this.data[this.currentQ].options[optIndex];
                this.answered = true;
                if (this.selected === this.data[this.currentQ].correct) this.score++;
                this.render();

            next() {
                this.currentQ++;

            `;
        });
        dialoguesContainer.innerHTML = dialoguesHtml;

        // --- TAB 4: GRAMMAR RENDER ---
        const grammarContainer = document.getElementById('tab-grammar');
        let grammarHtml = '';
        GRAMMAR.forEach(point => {
            let examplesHtml = '';
            point.examples.forEach(ex => {
                const escapedHanzi = ex.hanzi.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                examplesHtml += `
                    <div class="bg-slate-900/50 p-5 rounded-xl border border-slate-700/50 flex gap-4">
                        <button onclick="window.playAudio(event, '${escapedHanzi}')" class="flex-shrink-0 bg-slate-800 text-teal-400 p-2.5 rounded-full hover:bg-teal-600 hover:text-white transition-all h-fit">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                        </button>
                        <div>
                            <p class="text-xl font-bold text-white mb-1">${ex.hanzi}</p>
                            <p class="text-teal-400/80 mb-2">${ex.pinyin}</p>
                            <p class="text-slate-400 text-sm">${ex.uz}</p>
                        </div>
                    </div>
                `;
            });
            grammarHtml += `
                <div class="bg-slate-800 border border-slate-700 rounded-2xl p-8 shadow-xl">
                    <h3 class="text-2xl font-bold text-white mb-6 border-b border-slate-700 pb-4">${point.title}</h3>
                    <div class="space-y-4 mb-8">
                        <p class="text-slate-300 flex items-start gap-3"><span class="bg-slate-900 px-2 py-1 rounded text-xs font-bold text-teal-500 mt-0.5">UZ</span> <span>${point.uzDesc}</span></p>
                        <p class="text-slate-400 flex items-start gap-3"><span class="bg-slate-900 px-2 py-1 rounded text-xs font-bold text-blue-400 mt-0.5">RU</span> <span>${point.ruDesc}</span></p>
                        <p class="text-slate-400 flex items-start gap-3"><span class="bg-slate-900 px-2 py-1 rounded text-xs font-bold text-emerald-400 mt-0.5">EN</span> <span>${point.enDesc}</span></p>
                    </div>
                    <h4 class="text-lg font-semibold text-teal-400 mb-4">Misollar (Examples):</h4>
                    <div class="space-y-4">
                        ${examplesHtml}
                    </div>
                </div>
            `;
        });
        grammarContainer.innerHTML = grammarHtml;

    </script>
</body>
</html>
