<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生词学习 - Lesson 13</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 3D Flip Custom Utilities */
        .perspective-1000 {
            perspective: 1000px;
        }
        .transform-style-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }
        
        /* 隐藏滚动条但允许滚动 (如果需要) */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-900 text-slate-200 font-sans selection:bg-teal-500/30 flex flex-col overflow-x-hidden">

    <!-- Header -->
    <header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-10 shadow-lg">
        <div class="max-w-6xl mx-auto px-4 py-6">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-emerald-300 text-center drop-shadow-sm mb-2">
                我们爱上中文课 (生词学习)
            </h1>
            <h2 class="text-center text-slate-400 font-medium tracking-wide">
                Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz
            </h2>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-2xl w-full mx-auto px-4 py-12 flex flex-col items-center justify-center">
        
        <!-- Flashcard Container -->
        <div class="perspective-1000 w-full h-[500px] mb-8 cursor-pointer group" id="card-container">
            
            <!-- Card Inner (handles the 3D flip) -->
            <div id="card-inner" class="relative w-full h-full transition-transform duration-500 transform-style-3d shadow-2xl rounded-3xl">
                
                <!-- Front Face -->
                <div class="absolute inset-0 backface-hidden bg-slate-800 border border-slate-700 rounded-3xl p-10 flex flex-col items-center justify-center text-center group-hover:shadow-teal-900/20 transition-all">
                    <div class="absolute top-6 right-6 text-slate-500 font-mono text-sm" id="counter-front">1 / 13</div>
                    
                    <button id="audio-btn-front" class="mx-auto bg-teal-500/10 text-teal-400 p-5 rounded-full mb-8 hover:bg-teal-500/20 transition-colors z-10 relative">
                        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                    </button>
                    
                    <h2 id="hanzi-front" class="text-8xl sm:text-9xl font-bold text-white mb-8 drop-shadow-md">新年</h2>
                    <p class="text-slate-500 mt-4 text-sm font-medium tracking-wider animate-pulse">Ko'rish uchun bosing (点击翻转)</p>
                </div>

                <!-- Back Face -->
                <div class="absolute inset-0 backface-hidden rotate-y-180 bg-slate-800 border border-slate-700 rounded-3xl p-8 flex flex-col items-center justify-center text-center overflow-hidden">
                    <div class="absolute top-6 right-6 text-slate-500 font-mono text-sm" id="counter-back">1 / 13</div>
                    
                    <button id="audio-btn-back" class="mx-auto bg-teal-500/10 text-teal-400 p-3 rounded-full mb-4 hover:bg-teal-500/20 transition-colors z-10 relative">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                    </button>

                    <h2 id="hanzi-back" class="text-5xl font-bold text-white mb-2 drop-shadow-md">新年</h2>
                    <p id="pinyin-back" class="text-3xl text-teal-400 font-medium mb-6 font-sans">xīnnián</p>
                    
                    <div class="space-y-3 text-lg w-full max-w-sm">
                        <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-700/50 text-slate-200 text-left">
                            <span class="text-xs text-teal-500/70 font-bold uppercase tracking-wider block mb-1">Uzbek</span>
                            <span id="uz-text">Yangi yil</span>
                        </div>
                        <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-700/50 text-slate-200 text-left">
                            <span class="text-xs text-blue-400/70 font-bold uppercase tracking-wider block mb-1">Russian</span>
                            <span id="ru-text">Новый год</span>
                        </div>
                        <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-700/50 text-slate-200 text-left">
                            <span class="text-xs text-emerald-400/70 font-bold uppercase tracking-wider block mb-1">English</span>
                            <span id="en-text">New Year</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex space-x-6 w-full justify-center">
            <button id="prev-btn" class="flex items-center px-8 py-4 bg-slate-800 hover:bg-slate-700 text-white font-medium rounded-2xl shadow-lg transition-colors border border-slate-700">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                Oldingisi
            </button>
            <button id="next-btn" class="flex items-center px-8 py-4 bg-teal-600 hover:bg-teal-500 text-white font-medium rounded-2xl shadow-lg transition-colors">
                Keyingisi 
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ml-2"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-slate-950 border-t border-slate-800 py-8 text-center text-slate-500 text-sm mt-auto">
        <p class="font-semibold text-slate-400 mb-1">HSK 2 NEW3.0 - Lesson 13</p>
        <p>&copy; 2026 Dilfuza Kāng lǎo shī (telegram@diffila)</p>
    </footer>

    <!-- Application Logic -->
    <script>
        const VOCABULARY = [
            { id: 1, hanzi: "新年", pinyin: "xīnnián", uz: "Yangi yil", ru: "Новый год", en: "New Year" },
            { id: 2, hanzi: "教", pinyin: "jiāo", uz: "o'rgatmoq", ru: "учить, обучать", en: "teach" },
            { id: 3, hanzi: "花", pinyin: "huā", uz: "gul", ru: "цветок", en: "flower" },
            { id: 4, hanzi: "希望", pinyin: "xīwàng", uz: "umid qilmoq", ru: "надеяться", en: "hope; wish" },
            { id: 5, hanzi: "上面", pinyin: "shàngmiàn", uz: "ustida, yuqorida", ru: "наверху, над", en: "surface of an object, above" },
            { id: 6, hanzi: "洗手间", pinyin: "xǐshǒujiān", uz: "hojatxona", ru: "туалет, ванная", en: "washroom; restroom" },
            { id: 7, hanzi: "里面", pinyin: "lǐmiàn", uz: "ichida", ru: "внутри", en: "inside" },
            { id: 8, hanzi: "笔", pinyin: "bǐ", uz: "chiziq (ieroglifda)", ru: "черта (в иероглифе)", en: "stroke" },
            { id: 9, hanzi: "可能", pinyin: "kěnéng", uz: "ehtimol, mumkin", ru: "возможно, может быть", en: "probably, can" },
            { id: 10, hanzi: "上网", pinyin: "shàngwǎng", uz: "internetga kirmoq", ru: "заходить в интернет", en: "go online" },
            { id: 11, hanzi: "那样", pinyin: "nàyàng", uz: "shunday qilib, u holda", ru: "так, таким образом", en: "so that, like that" },
            { id: 12, hanzi: "告诉", pinyin: "gàosu", uz: "aytmoq", ru: "сказать, сообщить", en: "tell" },
            { id: 13, hanzi: "班", pinyin: "bān", uz: "sinf, guruh", ru: "класс, группа", en: "class" }
        ];

        let currentIndex = 0;
        let isFlipped = false;

        // DOM Elements
        const cardContainer = document.getElementById('card-container');
        const cardInner = document.getElementById('card-inner');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        
        const audioBtnFront = document.getElementById('audio-btn-front');
        const audioBtnBack = document.getElementById('audio-btn-back');

        // Render Data Functions
        function renderCard() {
            const card = VOCABULARY[currentIndex];
            
            document.getElementById('counter-front').innerText = `${currentIndex + 1} / ${VOCABULARY.length}`;
            document.getElementById('counter-back').innerText = `${currentIndex + 1} / ${VOCABULARY.length}`;
            
            document.getElementById('hanzi-front').innerText = card.hanzi;
            document.getElementById('hanzi-back').innerText = card.hanzi;
            document.getElementById('pinyin-back').innerText = card.pinyin;
            document.getElementById('uz-text').innerText = card.uz;
            document.getElementById('ru-text').innerText = card.ru;
            document.getElementById('en-text').innerText = card.en;
        }

        function updateFlip() {
            if (isFlipped) {
                cardInner.classList.add('rotate-y-180');
            } else {
                cardInner.classList.remove('rotate-y-180');
            }
        }

        // Audio Playback
        function playAudio(e) {
            e.stopPropagation(); // 阻止点击事件冒泡，防止触发卡片翻转
            const text = VOCABULARY[currentIndex].hanzi;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            }
        }

        // Event Listeners
        cardContainer.addEventListener('click', () => {
            isFlipped = !isFlipped;
            updateFlip();
        });

        prevBtn.addEventListener('click', () => {
            currentIndex = currentIndex > 0 ? currentIndex - 1 : VOCABULARY.length - 1;
            isFlipped = false;
            updateFlip();
            // Wait slightly for flip animation to start before changing text
            setTimeout(renderCard, 150);
        });

        nextBtn.addEventListener('click', () => {
            currentIndex = currentIndex < VOCABULARY.length - 1 ? currentIndex + 1 : 0;
            isFlipped = false;
            updateFlip();
            // Wait slightly for flip animation to start before changing text
            setTimeout(renderCard, 150);
        });

        audioBtnFront.addEventListener('click', playAudio);
        audioBtnBack.addEventListener('click', playAudio);

        // Initialization
        renderCard();
    </script>
</body>
</html>
